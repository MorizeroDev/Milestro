name: Clang Format

on:
  pull_request:
    branches:
      - master
      - release/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Check clang-format
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "."
          exclude: "./ext"
          extensions: "h,hh,hpp,c,cc,cpp,cxx,mm"
          clangFormatVersion: 20
          inplace: false
